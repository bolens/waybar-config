name: "CI: ShellCheck"

on:
  push:
    branches: [main]
    paths:
      - "**.sh"
      - ".shellcheckrc"
      - ".github/workflows/shellcheck.yml"
  pull_request:
    branches: [main]
    paths:
      - "**.sh"
      - ".shellcheckrc"
      - ".github/workflows/shellcheck.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: scripts
          # Enforce warnings (repo .shellcheckrc sets shell=bash + external-sources).
          severity: warning
