name: CI

on:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "!scripts/**/*.md"
      - "!scripts/*.md"
      - "data/**"
      - "layouts/**"
      - "modules/**"
      - "includes/**"
      - "theme/**"
      - "theme.css"
      - "config.jsonc"
      - "style.css"
      - "user-style/**"
      - "Makefile"
      - "systemd/**"
      - ".shellcheckrc"
      - ".gitignore"
      - ".github/workflows/ci.yml"
  # No path filters on PRs so branch protection / ci-result always receive a status.
  pull_request:
    branches: [main]
  workflow_dispatch:
  # Weekly full run (no path filters) catches filter blind spots.
  schedule:
    - cron: "17 6 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  # Mirrored into job if: via github.event_name (env context is not allowed there).
  FORCE_ALL: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}

jobs:
  # Decide which suites are relevant to the changed files.
  # Keep push on.paths ⊇ union of all dorny filters (or push CI never starts).
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      scripts: ${{ steps.flags.outputs.scripts }}
      generator: ${{ steps.flags.outputs.generator }}
      secrets: ${{ steps.flags.outputs.secrets }}
      validate: ${{ steps.flags.outputs.validate }}
      systemd: ${{ steps.flags.outputs.systemd }}
      workflow: ${{ steps.flags.outputs.workflow }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        if: env.FORCE_ALL != 'true'
        with:
          # list-files lets Resolve suite flags ignore markdown-only scripts/** hits
          # (dorny ! patterns need predicate-quantifier:every, which breaks multi-path ORs).
          list-files: json
          filters: |
            # Harness/workflow only — suite file edits belong under generator/secrets
            # so they do not force validate + systemd via workflow=true.
            workflow:
              - '.github/workflows/ci.yml'
              - 'Makefile'
              - '.shellcheckrc'
              - 'scripts/ci/lib/**'
              - 'scripts/ci/waybar-test-sanitize-env.sh'
              - 'scripts/ci/check-*.sh'
              - 'scripts/ci/install-hooks.sh'
            scripts:
              - 'scripts/**'
            # Generator suites copy/exercise almost every script domain + generated
            # configs — keep this aligned with scripts/** so status/module changes
            # actually re-run the integration harness (not only generate/*.sh).
            generator:
              - 'scripts/**'
              - 'scripts/ci/tests/generator/**'
              - 'scripts/ci/lib/**'
              - 'data/**'
              - 'layouts/**'
              - 'modules/**'
              - 'includes/**'
              - 'theme/**'
              - 'theme.css'
              - 'style.css'
              - 'user-style/**'
              - 'config.jsonc'
            # Non-scripts paths that still require the generator matrix.
            generator_nonscript:
              - 'data/**'
              - 'layouts/**'
              - 'modules/**'
              - 'includes/**'
              - 'theme/**'
              - 'theme.css'
              - 'style.css'
              - 'user-style/**'
              - 'config.jsonc'
            # Secrets suites are narrower: helpers they copy + polish scripts they run.
            # Keep in sync with waybar_test_secrets_sandbox / waybar_test_secrets_copy_polish_scripts
            # / waybar_test_install_script_stubs. Real scripts/tools/* are stubbed (fixture
            # app-open.sh) — do not list scripts/tools/** here.
            secrets:
              - 'scripts/ci/tests/secrets/**'
              - 'scripts/ci/lib/**'
              - 'scripts/ci/waybar-test-sanitize-env.sh'
              - 'scripts/ci/pre-commit-check-secrets.sh'
              - 'scripts/ci/validate-generated-config.sh'
              - 'scripts/lib/waybar-settings.sh'
              - 'scripts/lib/capture-lib.sh'
              - 'scripts/lib/compositor-gate.sh'
              - 'scripts/lib/compositor-session.sh'
              - 'scripts/lib/waybar-cache-helpers.sh'
              - 'scripts/lib/waybar-locale-lib.sh'
              - 'scripts/lib/waybar-systemd-scan-lib.sh'
              - 'scripts/lib/unicode-animations-lib.sh'
              - 'scripts/lib/notifications-lib.sh'
              - 'scripts/lib/app-open-lib.sh'
              - 'scripts/lib/rofi-popup-lib.sh'
              - 'scripts/lib/network-ip-lib.sh'
              - 'scripts/lib/xdg-icons-lib.sh'
              - 'scripts/lib/xdg-applications.sh'
              - 'scripts/lib/gtk_popup_helpers.py'
              - 'scripts/lib/locale_temp.py'
              - 'scripts/lib/kde_listener/**'
              - 'scripts/lib/system-metrics-*.sh'
              - 'scripts/listeners/active-window-listener-kde.py'
              - 'scripts/services/i2pd/i2pd-set-console-pass.sh'
              - 'scripts/services/coolercontrol/coolercontrol-set-ui-pass.sh'
              - 'scripts/services/sync/updates-status.sh'
              - 'scripts/services/sync/updates-review.sh'
              - 'scripts/services/apps/github-status.sh'
              - 'scripts/services/security/**'
              - 'scripts/services/devices/**'
              - 'scripts/system/powerprofiles-click.sh'
              - 'scripts/workspaces/keybindhint-click.sh'
              - 'data/waybar-secrets*'
              - 'data/waybar-settings*'
              - '.gitignore'
            validate:
              - 'scripts/ci/validate-generated-config.sh'
              - 'scripts/ci/check-generated-drift.sh'
              - 'scripts/ci/check-settings-schema.sh'
              - 'scripts/ci/lib/settings-top-level-allowlist.txt'
              - 'scripts/generate/**'
              - 'scripts/lib/waybar-settings.sh'
              - 'data/**'
              - 'layouts/**'
              - 'modules/**'
              - 'includes/**'
              - 'theme/**'
              - 'theme.css'
              - 'config.jsonc'
              - 'style.css'
              - 'user-style/**'
            systemd:
              - 'systemd/**'
              - 'scripts/ci/check-systemd-units.sh'
              - 'scripts/infra/waybar-launch.sh'
              - 'scripts/infra/listener-ctl.sh'
              - 'scripts/infra/waybar-healthcheck.sh'
              - 'scripts/infra/waybar-journal-drop.rg'
              - 'scripts/listeners/active-window-listener-kde.py'
              - 'scripts/lib/kde_listener/**'
      - name: Resolve suite flags
        id: flags
        env:
          F_SCRIPTS: ${{ steps.filter.outputs.scripts }}
          F_GENERATOR: ${{ steps.filter.outputs.generator }}
          F_GENERATOR_NONSCRIPT: ${{ steps.filter.outputs.generator_nonscript }}
          F_SECRETS: ${{ steps.filter.outputs.secrets }}
          F_VALIDATE: ${{ steps.filter.outputs.validate }}
          F_SYSTEMD: ${{ steps.filter.outputs.systemd }}
          F_WORKFLOW: ${{ steps.filter.outputs.workflow }}
          # JSON arrays of matched paths (empty when FORCE_ALL / filter skipped).
          FILES_SCRIPTS: ${{ steps.filter.outputs.scripts_files }}
          FILES_GENERATOR: ${{ steps.filter.outputs.generator_files }}
        run: |
          set -euo pipefail
          if [ "${FORCE_ALL}" = "true" ]; then
            {
              echo "scripts=true"
              echo "generator=true"
              echo "secrets=true"
              echo "validate=true"
              echo "systemd=true"
              echo "workflow=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          scripts="${F_SCRIPTS:-false}"
          generator="${F_GENERATOR:-false}"

          # Markdown under scripts/ must not pull bash -n / generator suites.
          # Keep generator true when non-script generator paths also changed.
          has_non_md_scripts() {
            local files="${1:-[]}"
            printf '%s' "$files" | jq -e '
              type == "array"
              and any(.[]; startswith("scripts/") and (endswith(".md") | not))
            ' >/dev/null 2>&1
          }

          if [ "$scripts" = "true" ] && ! has_non_md_scripts "${FILES_SCRIPTS:-[]}"; then
            scripts=false
          fi
          if [ "$generator" = "true" ]; then
            if has_non_md_scripts "${FILES_GENERATOR:-[]}" \
              || [ "${F_GENERATOR_NONSCRIPT:-false}" = "true" ]; then
              generator=true
            else
              generator=false
            fi
          fi

          {
            echo "scripts=${scripts}"
            echo "generator=${generator}"
            echo "secrets=${F_SECRETS:-false}"
            echo "validate=${F_VALIDATE:-false}"
            echo "systemd=${F_SYSTEMD:-false}"
            echo "workflow=${F_WORKFLOW:-false}"
          } >> "$GITHUB_OUTPUT"

  suite-inventory:
    name: Suite inventory sync
    needs: changes
    if: |
      always()
      && needs.changes.result == 'success'
      && (needs.changes.outputs.workflow == 'true'
          || needs.changes.outputs.generator == 'true'
          || needs.changes.outputs.secrets == 'true'
          || github.event_name == 'schedule'
          || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Compare CI matrix to on-disk suites
        run: bash scripts/ci/check-suite-inventory.sh
      - name: Check CI path filters cover CSS surfaces
        run: bash scripts/ci/check-ci-path-filters.sh

  # Fast fail-early checks before the heavier suites.
  syntax:
    name: bash -n
    needs: changes
    if: needs.changes.outputs.scripts == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Syntax-check all shell scripts
        run: |
          set -euo pipefail
          fail=0
          for f in $(find scripts -type f -name '*.sh' | sort); do
            echo "Checking $f"
            bash -n "$f" || fail=1
          done
          exit "$fail"

  python-syntax:
    name: python -m py_compile
    needs: changes
    if: needs.changes.outputs.scripts == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Syntax-check Python helpers
        env:
          WAYBAR_HOME: ${{ github.workspace }}
        run: bash scripts/ci/check-python-syntax.sh

  contracts:
    name: Shell contracts (dash)
    needs: changes
    if: needs.changes.outputs.scripts == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install jq + dash
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq dash
      - name: Run shell contract checks
        env:
          WAYBAR_HOME: ${{ github.workspace }}
        run: bash scripts/ci/check-shell-contracts.sh

  # Modular generator suites — matrix shards run in parallel (no nested secrets).
  generator-tests:
    name: Generator / ${{ matrix.suite }}
    needs: [changes, syntax, contracts, suite-inventory]
    if: |
      always()
      && needs.changes.result == 'success'
      && (needs.syntax.result == 'success' || needs.syntax.result == 'skipped')
      && (needs.contracts.result == 'success' || needs.contracts.result == 'skipped')
      && (needs.suite-inventory.result == 'success' || needs.suite-inventory.result == 'skipped')
      && (needs.changes.outputs.workflow == 'true' || needs.changes.outputs.generator == 'true')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - generate-smoke
          - drawer-sot-contracts
          - drawer-group-css-contracts
          - pill-css-contracts
          - slot-css-contracts
          - listener-lifecycle
          - settings-overrides-modules
          - settings-overrides-polish
          - settings-overrides-layout-theme
          - bars-floating-geometry
          - theme-mode-pipeline
          - theme-wallpaper-per-output
          - lib-utils
          - generator-resilience
          - path-edge-cases
          - liquidctl
          - coolercontrol-module-wiring
          - coolercontrol-module-auth
          - asusctl
          - hw-nvme-olh
          - hw-rgb-fans
          - weather-status
          - portability
          - power-menu
          - pomodoro
          - homelab-status
          - apply-profile
          - cava-status
          - cava-placement
          - album-art-wiring
          - keyboard-layout-plasma
          - streamdeck-module
          - stats-carousel
          - animations-css
          - reduced-motion
          - gtk-css-compat
          - dock-appicon-cache
          - dock-appicon-css
          - dock-windows-hypr
          - dock-windows-plasma
          - dock-windows-regressions
          - active-window-kde-cache
          - github-status
          - vpn-cooling-refresh
          - per-output-core
          - per-output-modules
          - visual-gauges
          - mcp-server
    steps:
      - uses: actions/checkout@v7
      - name: Install jq + dash
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq dash
      - name: Run generator suite ${{ matrix.suite }}
        env:
          WAYBAR_HOME: ${{ github.workspace }}
        run: bash "scripts/ci/tests/generator/${{ matrix.suite }}.sh"

  # Modular secrets suites — sibling to generator (not nested).
  secrets-tests:
    name: Secrets / ${{ matrix.suite }}
    needs: [changes, syntax, contracts, suite-inventory]
    if: |
      always()
      && needs.changes.result == 'success'
      && (needs.syntax.result == 'success' || needs.syntax.result == 'skipped')
      && (needs.contracts.result == 'success' || needs.contracts.result == 'skipped')
      && (needs.suite-inventory.result == 'success' || needs.suite-inventory.result == 'skipped')
      && (needs.changes.outputs.workflow == 'true' || needs.changes.outputs.secrets == 'true')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - overlay-getters
          - capture-lib
          - credential-guards
          - i2pd-sync
          - coolercontrol-sync-bootstrap
          - coolercontrol-sync-auth
          - polish-runtime
          - compositor-gate
          - precommit-secrets
    steps:
      - uses: actions/checkout@v7
      - name: Install jq + dash
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq dash
      - name: Run secrets suite ${{ matrix.suite }}
        env:
          WAYBAR_HOME: ${{ github.workspace }}
        run: bash "scripts/ci/tests/secrets/${{ matrix.suite }}.sh"

  validate-config:
    name: Validate generated config
    needs: [changes, syntax, contracts]
    if: |
      always()
      && needs.changes.result == 'success'
      && (needs.syntax.result == 'success' || needs.syntax.result == 'skipped')
      && (needs.contracts.result == 'success' || needs.contracts.result == 'skipped')
      && (needs.changes.outputs.workflow == 'true' || needs.changes.outputs.validate == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install jq + dash
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq dash
      - name: Validate generated config
        env:
          WAYBAR_HOME: ${{ github.workspace }}
        run: |
          bash scripts/ci/validate-generated-config.sh
          bash scripts/ci/check-settings-schema.sh

  generated-drift:
    name: Generated artifact drift
    needs: [changes, syntax, contracts]
    if: |
      always()
      && needs.changes.result == 'success'
      && (needs.syntax.result == 'success' || needs.syntax.result == 'skipped')
      && (needs.contracts.result == 'success' || needs.contracts.result == 'skipped')
      && (needs.changes.outputs.workflow == 'true' || needs.changes.outputs.validate == 'true'
          || needs.changes.outputs.generator == 'true'
          || github.event_name == 'schedule'
          || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq
      - name: Regenerate and diff committed artifacts
        env:
          WAYBAR_HOME: ${{ github.workspace }}
        run: bash scripts/ci/check-generated-drift.sh

  systemd-units:
    name: Systemd unit path smoke
    needs: [changes]
    if: |
      always()
      && needs.changes.result == 'success'
      && (needs.changes.outputs.workflow == 'true' || needs.changes.outputs.systemd == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check systemd unit templates
        env:
          WAYBAR_HOME: ${{ github.workspace }}
        run: bash scripts/ci/check-systemd-units.sh

  # Single required status for branch protection (skipped jobs are OK).
  ci-result:
    name: CI result
    if: always()
    needs:
      - changes
      - suite-inventory
      - syntax
      - python-syntax
      - contracts
      - generator-tests
      - secrets-tests
      - validate-config
      - generated-drift
      - systemd-units
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate job results
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os, sys
          needs = json.loads(os.environ["NEEDS_JSON"])
          bad = {k: v.get("result") for k, v in needs.items()
                 if v.get("result") in ("failure", "cancelled")}
          if bad:
              print("FAIL: required jobs did not succeed:", bad, file=sys.stderr)
              sys.exit(1)
          print("ok: all jobs succeeded or were skipped")
          PY
