name: "CI: shfmt"

on:
  push:
    branches: [main]
    paths:
      - "**.sh"
      - ".github/workflows/shfmt.yml"
      - "scripts/ci/check-shfmt.sh"
  pull_request:
    branches: [main]
    paths:
      - "**.sh"
      - ".github/workflows/shfmt.yml"
      - "scripts/ci/check-shfmt.sh"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  shfmt:
    name: shfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Download shfmt
        env:
          SHFMT_VERSION: "3.13.1"
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/shfmt \
            "https://github.com/mvdan/sh/releases/download/v${SHFMT_VERSION}/shfmt_v${SHFMT_VERSION}_linux_amd64"
          chmod +x /tmp/shfmt
          echo "/tmp" >> "$GITHUB_PATH"
      - name: Check formatting
        env:
          SHFMT_BIN: /tmp/shfmt
          SHFMT_VERSION: "3.13.1"
        run: bash scripts/ci/check-shfmt.sh
